<!DOCTYPE html>
<html>

<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:20px;">

        <table width="600" cellpadding="0" cellspacing="0"
          style="background:#ffffff; border-radius:12px; overflow:hidden;">

          <!-- LOGO -->
          <tr>
            <td style="padding:20px;">
              <img src="https://portal.grupoavanza.work/assets/img/logo.png" width="140">
            </td>
          </tr>

          <!-- SALUDO -->
          <tr>
            <td style="padding:0 20px 10px 20px;">
              <p style="font-size:18px; color:#333; margin:0;">
                Hola <strong style="color:#2b6edc;">{{recipient}}</strong>
              </p>
            </td>
          </tr>

          <!-- IMAGEN -->
          <tr>
            <td align="center" style="padding:10px 20px;">
              <img src="https://portal.grupoavanza.work/assets/img/volcanesPublic.png" width="100%" style="display:block; border-radius:12px;">
            </td>
          </tr>

          <!-- TEXTO -->
          <tr>
            <td style="padding:20px; text-align:left;">

              <p style="font-size:15px; color:#555; margin-bottom:10px;">
                Gracias por contactarnos.
              </p>

              <p style="font-size:15px; color:#555; margin-top:0;">
                Aquí está la respuesta a tu consulta:
              </p>

            </td>
          </tr>

          <!-- BLOQUE RESPUESTA -->
          <tr>
            <td style="padding:0 20px 20px 20px;">

              <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f3f6; border-radius:10px;">

                <tr>
                  <td style="padding:15px;">

                    <p style="margin:0; font-size:14px; color:#333;">
                      <strong>Respondido por:</strong> {{agent_name}}
                    </p>

                    <p style="margin:5px 0; font-size:12px; color:#888;">
                      {{response_date}}
                    </p>

                    <p style="margin:10px 0 0 0; font-size:14px; color:#555;">
                      {{response_message}}
                    </p>

                  </td>
                </tr>

              </table>

            </td>
          </tr>

          <!-- BOTÓN -->
          <tr>
            <td align="center" style="padding:10px 20px 30px 20px;">
              <a href="https://portal.grupoavanza.work/contact-center"
                style="background:#4c7ef3; color:#ffffff; text-decoration:none; padding:12px 25px; border-radius:25px; font-size:14px; display:inline-block;">
                Ver respuesta completa
              </a>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>

</html>
