<!DOCTYPE html>
<html>

<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:20px;">

        <table width="600" cellpadding="0" cellspacing="0"
          style="background:#ffffff; border-radius:12px; overflow:hidden;">

          <!-- LOGO -->
          <tr>
            <td style="padding:20px;">
              <img src="https://portal.grupoavanza.work/assets/img/logo.png" width="140">
            </td>
          </tr>

          <!-- SALUDO -->
          <tr>
            <td style="padding:0 20px 10px 20px;">
              <p style="font-size:18px; color:#333; margin:0;">
                Hola <strong style="color:#2b6edc;">{{company_name}}</strong>
              </p>
            </td>
          </tr>

          <!-- IMAGEN -->
          <tr>
            <td align="center" style="padding:10px 20px;">
              <img src="https://portal.grupoavanza.work/assets/img/volcanesCom.png" width="100%"
                style="display:block; border-radius:12px;">
            </td>
          </tr>

          <!-- MENSAJE -->
          <tr>
            <td style="padding:20px;">
              <p style="font-size:15px; color:#555;">
                Tu cuenta ha sido desactivada por el siguiente motivo:
              </p>

              <p style="font-size:16px; color:#2b6edc; font-weight:bold;">
                {{reason}}
              </p>

              <p style="font-size:15px; color:#555;">
                El acceso ha sido bloqueado. Si necesitas asistencia:
              </p>
            </td>
          </tr>

          <!-- BOTÓN -->
          <tr>
            <td align="center" style="padding:10px 20px 30px 20px;">
              <a href="https://portal.grupoavanza.work/contact"
                style="background:#1f2a44; color:#ffffff; text-decoration:none; padding:12px 25px; border-radius:25px; font-size:14px; display:inline-block;">
                Contáctanos
              </a>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>

</html>
