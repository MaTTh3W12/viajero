<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
<tr>
<td align="center" style="padding:20px;">

<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; overflow:hidden;">

<!-- LOGO -->
<tr>
<td style="padding:20px;">
  <img src="https://portal.grupoavanza.work/assets/img/logo.png" width="140">
</td>
</tr>

<!-- SALUDO -->
<tr>
<td style="padding:0 20px 10px 20px;">
  <p style="font-size:18px; color:#333; margin:0;">
    Hola <strong style="color:#2b6edc;">{{name}}</strong>
  </p>
</td>
</tr>

<!-- IMAGEN PRINCIPAL -->
<tr>
<td align="center" style="padding:10px 20px;">
  <img
    src="https://portal.grupoavanza.work/assets/img/volcanesPublic.png"
    width="100%"
    style="display:block; border-radius:12px;"
  >
</td>
</tr>

<!-- TEXTO -->
<tr>
<td style="padding:20px; text-align:left;">

  <p style="font-size:15px; color:#555; margin-bottom:10px;">
    Has recibido un cupón transferido por
    <strong style="color:#2b6edc;">{{sender_name}}</strong>.
  </p>

  <p style="font-size:15px; color:#555; margin-top:0;">
    Ya puedes utilizarlo en la plataforma.
  </p>

</td>
</tr>

<!-- CARD CUPÓN -->
<tr>
<td align="center" style="padding:10px 20px 20px 20px;">

  <table width="300" cellpadding="0" cellspacing="0" style="background:#f9f9f9; border-radius:16px; overflow:hidden;">

    <!-- Info -->
    <tr>
      <td style="padding:15px; text-align:left;">

        <!-- Categoría -->
        <p style="margin:0; font-size:12px; color:#888;">
          <img src="https://portal.grupoavanza.work/assets/icons/sunbed.svg" width="14" style="vertical-align:middle; margin-right:5px;">
          {{category}}
        </p>

        <!-- Empresa -->
        <p style="margin:5px 0; font-size:14px; color:#2b6edc;">
          {{company_name}}
        </p>

        <!-- Título -->
        <p style="margin:5px 0; font-size:14px; color:#333; font-weight:bold;">
          {{coupon_title}}
        </p>

        <!-- Descuento -->
        <p style="margin:8px 0; font-size:13px; color:#2b6edc;">
          {{discount}}% OFF
        </p>

        <!-- Ubicación -->
        <p style="margin:5px 0; font-size:12px; color:#777;">
          <img src="https://portal.grupoavanza.work/assets/icons/location.svg" width="14" style="vertical-align:middle; margin-right:5px;">
          {{location}}
        </p>

        <!-- Fecha -->
        <p style="margin:5px 0; font-size:12px; color:#777;">
          <img src="https://portal.grupoavanza.work/assets/icons/calendar.svg" width="14" style="vertical-align:middle; margin-right:5px;">
          Vence: {{expiration_date}}
        </p>

      </td>
    </tr>

  </table>

</td>
</tr>

<!-- BOTÓN -->
<tr>
<td align="center" style="padding:10px 20px 30px 20px;">
  <a href="{{coupon_url}}"
     style="background:#4c7ef3; color:#ffffff; text-decoration:none; padding:12px 25px; border-radius:25px; font-size:14px; display:inline-block;">
    Ver cupón
  </a>
</td>
</tr>

<!-- FOOTER -->
<tr>
<td style="padding:20px; text-align:center; font-size:12px; color:#999;">
  © ViajeroSV
</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
