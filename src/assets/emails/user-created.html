<!DOCTYPE html>
<html>

<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:20px;">

        <table width="600" cellpadding="0" cellspacing="0"
          style="background:#ffffff; border-radius:12px; overflow:hidden;">

          <!-- LOGO -->
          <tr>
            <td style="padding:20px;">
              <img src="https://portal.grupoavanza.work/assets/img/logo.png" width="140">
            </td>
          </tr>

          <!-- SALUDO -->
          <tr>
            <td style="padding:0 20px 10px 20px;">
              <p style="font-size:18px; color:#333; margin:0;">
                ¡El Salvador te espera, <strong style="color:#2b6edc;">{{name}}</strong>!
              </p>
            </td>
          </tr>

          <!-- IMAGEN PRINCIPAL -->
          <tr>
            <td align="center" style="padding:10px 20px;">
              <img src="https://portal.grupoavanza.work/assets/img/volcanesPublic.jpg" width="100%"
                style="border-radius:20px;">
            </td>
          </tr>

          <!-- TEXTO -->
          <tr>
            <td style="padding:20px;">
              <p style="font-size:15px; color:#555; text-align:center;">
                Tu cuenta ha sido creada y habilitada exitosamente.<br>
                Ya puedes acceder a todos los servicios disponibles.
              </p>
            </td>
          </tr>

          <!-- CATEGORIAS -->
          <tr>
            <td style="padding:10px 20px;">
              <p style="text-align:center; font-size:18px; color:#333; margin-bottom:10px;">
                Explora categorías
              </p>

              <table width="100%">
                <tr>

                  <!-- Tour operadores -->
                  <td align="center" style="padding:5px;">
                    <div style="background:#eef2f7; padding:10px; border-radius:20px; font-size:13px;">
                      <img src="https://portal.grupoavanza.work/assets/icons/traveler1.svg" width="16" height="16"
                        style="vertical-align:middle; margin-right:6px;">
                      Tour operadores
                    </div>
                  </td>

                  <!-- Transporte -->
                  <td align="center" style="padding:5px;">
                    <div style="background:#eef2f7; padding:10px; border-radius:20px; font-size:13px;">
                      <img src="https://portal.grupoavanza.work/assets/icons/bus1.svg" width="16" height="16"
                        style="vertical-align:middle; margin-right:6px;">
                      Transporte
                    </div>
                  </td>

                </tr>

                <tr>

                  <!-- Productos -->
                  <td align="center" style="padding:5px;">
                    <div style="background:#eef2f7; padding:10px; border-radius:20px; font-size:13px;">
                      <img src="https://portal.grupoavanza.work/assets/icons/product-quality1.svg" width="16"
                        height="16" style="vertical-align:middle; margin-right:6px;">
                      Productos nostálgicos
                    </div>
                  </td>

                  <!-- Alojamiento -->
                  <td align="center" style="padding:5px;">
                    <div style="background:#eef2f7; padding:10px; border-radius:20px; font-size:13px;">
                      <img src="https://portal.grupoavanza.work/assets/icons/double-bed.svg" width="16" height="16"
                        style="vertical-align:middle; margin-right:6px;">
                      Alojamiento
                    </div>
                  </td>

                </tr>
              </table>
            </td>
          </tr>

          <!-- BOTÓN -->
          <tr>
            <td align="center" style="padding:20px;">
              <a href="https://portal.grupoavanza.work/login"
                style="background:#4c7ef3; color:#fff; text-decoration:none; padding:12px 25px; border-radius:25px; font-size:14px; display:inline-block;">
                Iniciar sesión
              </a>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>

</html>
