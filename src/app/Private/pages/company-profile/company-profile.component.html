<app-topbar location="Perfil de empresa"></app-topbar>

<div class="bg-[#FFFFFF] min-h-screen px-4 py-5 md:p-10">
  <form [formGroup]="profileForm" (ngSubmit)="saveChanges()" class="space-y-8">

    <section>
      <h2 class="text-lg font-semibold text-[#1A2440] border-b border-[#C8CFDA] pb-3 mb-5">Información General</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Nombre comercial*</label>
          <input
            type="text"
            formControlName="commercialName"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">NIT*</label>
          <input
            type="text"
            formControlName="nit"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">E-mail empresarial*</label>
          <input
            type="email"
            formControlName="businessEmail"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Teléfono fijo</label>
          <input
            type="text"
            formControlName="phone"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Celular</label>
          <input
            type="text"
            formControlName="mobile"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Categoría</label>
          <select
            formControlName="category"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440]"
          >
            <option value="" disabled>Seleccionar categoría</option>
            <option *ngFor="let item of categories" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Descripción</label>
          <textarea
            formControlName="description"
            rows="4"
            placeholder="Agregar descripción"
            class="w-full rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 py-3 text-[#1A2440] placeholder:text-[#A0AEC0]"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Dirección</label>
          <textarea
            formControlName="address"
            rows="4"
            placeholder="Agregar descripción"
            class="w-full rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 py-3 text-[#1A2440] placeholder:text-[#A0AEC0]"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Sitio web</label>
          <input
            type="text"
            formControlName="website"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Google Maps URL</label>
          <input
            type="text"
            formControlName="mapsUrl"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>
      </div>

      <div class="mt-6">
        <label class="block text-sm font-medium text-[#1A2440] mb-2">Logo de la empresa*</label>

        <label class="w-full border border-dashed border-[#9FC0FF] rounded-xl bg-white px-6 py-8 text-center block cursor-pointer hover:bg-[#F9FBFF] transition">
          <input type="file" accept=".jpg,.jpeg,.png,.pdf" class="hidden" (change)="onLogoSelected($event)" />

          <p class="text-[#1A2440] font-semibold text-lg">Subir imagen de logo</p>
          <p class="text-xs text-[#A0AEC0] mt-2">Solo se permiten archivos tipo: JPG, JPEG, PNG, PDF. (Tamaño máximo: 500 kb)</p>
          @if (selectedLogoName) {
            <p class="text-sm text-[#538CFF] mt-2">{{ selectedLogoName }}</p>
          }
        </label>
      </div>
    </section>

    <section>
      <h2 class="text-lg font-semibold text-[#1A2440] border-b border-[#C8CFDA] pb-3 mb-5">Redes Sociales</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Facebook</label>
          <input
            type="text"
            formControlName="facebook"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">Instagram</label>
          <input
            type="text"
            formControlName="instagram"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">X</label>
          <input
            type="text"
            formControlName="x"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#1A2440] mb-2">YouTube</label>
          <input
            type="text"
            formControlName="youtube"
            placeholder="Agregar título"
            class="w-full h-12 rounded-lg bg-[#F4F7FD] border border-transparent focus:border-[#538CFF] focus:outline-none px-4 text-[#1A2440] placeholder:text-[#A0AEC0]"
          />
        </div>
      </div>
    </section>

    <div class="flex flex-col md:flex-row md:justify-end gap-3 pt-2 w-full md:w-auto md:ml-auto">
      <button
        type="button"
        (click)="cancelChanges()"
        class="order-1 md:order-2 w-full md:w-auto bg-white border text-[#1A2440] border-[#1A2440] px-6 py-2.5 rounded-full font-medium hover:bg-gray-50 transition"
      >
        Cancelar
      </button>

      <button
        type="submit"
        class="order-2 md:order-1 w-full md:w-auto bg-[#538CFF] text-white px-6 py-2.5 rounded-full font-medium hover:bg-blue-600 transition"
      >
        Guardar cambios
      </button>
    </div>

  </form>
</div>
