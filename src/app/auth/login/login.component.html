<div *ngIf="!showInactiveCompanyModal" class="min-h-screen bg-white flex items-center justify-center p-6">
  <div class="text-center">
    <svg class="animate-spin h-10 w-10 text-[#1A2440] mb-4 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"></path>
    </svg>
    <h2 class="text-xl text-[#1A2440] font-medium">Redirigiendo a inicio de sesión...</h2>
  </div>
</div>

<div *ngIf="showInactiveCompanyModal" class="fixed inset-0 z-[12000] flex items-center justify-center bg-white px-4">
  <div class="w-full max-w-[520px] rounded-[28px] bg-white p-7 shadow-2xl">
    <h3 class="text-center text-2xl font-semibold text-[#1A2440]">Cuenta de empresa inactiva</h3>
    <p class="mt-4 text-center text-[15px] leading-relaxed text-[#44506A]">
      Tu cuenta de empresa aún no está activa. Contacte a un administrador para activar su cuenta.
    </p>

    <div class="mt-7 flex justify-center">
      <button
        type="button"
        (click)="closeInactiveCompanyModal()"
        class="rounded-full bg-[#5B95FF] px-6 py-3 text-sm font-semibold text-white transition hover:bg-[#3F7BFF] active:scale-95"
      >
        Entendido
      </button>
    </div>
  </div>
</div>
