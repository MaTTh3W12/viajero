<section class="max-w-[1530px] mx-auto mt-12 relative">

  <!-- CUPÓN (Contenedor principal con relative para que nada se salga) -->
  <div class="relative h-[480px] flex rounded-[40px] overflow-hidden bg-white hero-coupon shadow-lg z-[100]">

    <!-- Columna izquierda: Azul Oscuro -->
    <!-- flex-shrink-0 evita que la columna se achique o se estire raro -->
    <div class="w-[440px] flex-shrink-0 bg-[#0E225C] text-white p-16 flex flex-col justify-center relative z-10">
      <h1 class="text-[54px] font-bold leading-[1.05] mb-6 tracking-tight font-museo">
        ¡El Salvador<br />te espera!
      </h1>

      <p class="text-xl leading-relaxed opacity-90 mb-10 max-w-[340px] font-museo">
        Adquiere cupones exclusivos para la <span class="text-[#538CFF] font-semibold">diáspora</span> y disfruta de la belleza de tu país
      </p>

      <button
        class="bg-[#538CFF] hover:bg-blue-400 transition-all px-10 py-4 rounded-full text-lg font-medium w-fit w-fit shadow-lg active:scale-95 font-museo"
      >
        Explorar cupones
      </button>
    </div>

    <!-- Columna derecha: Imagen -->
    <div class="relative flex-1 overflow-hidden">
      <img
        src="assets/img/volcanes.png"
        alt="Volcanes"
        class="w-full h-full object-cover"
      />

      <!-- Texto "Tours a" -->
      <div class="absolute top-[68px] left-[152px] text-white pointer-events-none">
        <p class="text-4xl font-medium tracking-wide drop-shadow-md opacity-95 font-museo">
          Tours a
        </p>
      </div>
    </div>

    <!-- HASHTAG - Posicionado abajo a la derecha como una pestaña -->

  </div>
  <div class="hashtag-wrapper font-museo">
      <img src="assets/img/hashtag-tab.svg" alt="" />
      <span>#DiásporaSV</span>
  </div>

</section>
