<section class="max-w-[1320px] mx-auto mt-12 md:mt-24 text-center px-4">

  <h2 class="text-2xl md:text-[32px] font-medium text-[#0E225C] mb-8 md:mb-14 font-museo">
    Explorar categorías
  </h2>

  <div class="flex items-center justify-center gap-4 md:gap-8">
    <button (click)="prev()"
      class="hidden sm:flex w-9 h-9 md:w-11 md:h-11 items-center justify-center rounded-full border border-[#538CFF] text-[#538CFF] hover:bg-blue-50 transition-colors">
      <span class="text-xl md:text-2xl leading-none -mt-1">‹</span>
    </button>

    <div #sliderContainer
      class="flex gap-4 md:gap-8 overflow-x-auto pb-4 md:pb-0 no-scrollbar md:w-[1080px]"
      (mouseenter)="pauseAutoplay()" (mouseleave)="resumeAutoplay()" (touchstart)="pauseAutoplay()">
      @for (category of categories; track category.key) {
      <button type="button" (click)="openCategory(category.key)"
        class="flex items-center h-[60px] md:h-[86px] bg-[#F4F7FB] rounded-full pr-6 md:pr-10 gap-3 md:gap-5 shadow-sm flex-shrink-0 transition-transform duration-300 hover:-translate-y-0.5 hover:shadow-md">
        <div
          class="w-[60px] h-[60px] md:w-[86px] md:h-[86px] rounded-full flex items-center justify-center flex-shrink-0"
          [style.background-color]="category.bgColor">
          <img [src]="category.icon"
            (error)="onIconError($event)"
            [class.brightness-0]="category.activeIcon"
            [class.invert]="category.activeIcon"
            class="w-[35px] h-[35px] md:w-[50px] md:h-[50px] object-contain" />
        </div>
        <span class="text-[#0E225C] text-sm md:text-[18px] font-medium font-museo whitespace-nowrap">
          {{ category.label }}
        </span>
      </button>
      }
    </div>

    <button (click)="next()"
      class="hidden sm:flex w-9 h-9 md:w-11 md:h-11 items-center justify-center rounded-full border border-[#538CFF] text-[#538CFF] hover:bg-blue-50 transition-colors">
      <span class="text-xl md:text-2xl leading-none -mt-1">›</span>
    </button>
  </div>
</section>
