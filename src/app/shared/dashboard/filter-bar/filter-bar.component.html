<div class="px-6 py-5 flex items-center" [class]="bgClass">

  @if (variant === 'users') {
  <div class="w-full flex flex-col gap-2">

    <!-- Label -->
    <label class="text-sm text-[#0E225C]">Buscar</label>

    <!-- Fila de controles -->
    <div class="flex items-center gap-3">

      <!-- Input -->
      <input type="text" placeholder="Buscar usuario" class="flex-1 bg-white rounded-xl px-4 py-3 text-[#0E225C]
             focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40" />

      <!-- Botón Buscar -->
      <button class="flex items-center gap-2 bg-[#538CFF] text-white
             px-6 py-3 rounded-full
             transition-all duration-300
             hover:bg-[#3F7BFF] hover:shadow-md
             active:scale-95">
        <img src="assets/icons/search.png" class="w-4 h-4" />
        Buscar
      </button>

      <!-- Botón Filtro -->
      <button class="w-11 h-11 flex items-center justify-center
             rounded-full border border-[#0E225C]
             transition hover:bg-black/5 active:scale-95">
        <img src="assets/icons/filter.svg" class="w-5 h-5" />
      </button>

    </div>
  </div>
  }

  @if (variant === 'category') {
  <div class="w-full flex flex-col gap-2">

    <!-- Label -->
    <label class="text-sm text-[#0E225C]">Buscar</label>

    <!-- Fila de controles -->
    <div class="flex items-center gap-3">

      <!-- Input -->
      <input type="text" placeholder="Buscar categoría" class="flex-1 bg-white rounded-xl px-4 py-3 text-[#0E225C]
             focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40" />

      <!-- Botón Buscar -->
      <button class="flex items-center gap-2 bg-[#538CFF] text-white
             px-6 py-3 rounded-full
             transition-all duration-300
             hover:bg-[#3F7BFF] hover:shadow-md
             active:scale-95">
        <img src="assets/icons/search.png" class="w-4 h-4" />
        Buscar
      </button>

      <!-- Botón Crear categoría -->
      <button class="flex items-center gap-2 bg-[#0E225C] text-white
             px-6 py-3 rounded-full
             transition-all duration-300
             hover:bg-[#0B1B4B] hover:shadow-md
             active:scale-95">
        <svg class="w-6 h-6">
          <use href="assets/icons/sprite.svg#add"></use>
        </svg>
        Crear categoría
      </button>

      <!-- Botón Filtro -->
      <button class="w-11 h-11 flex items-center justify-center
             rounded-full border border-[#0E225C] text-[#1A2440]
             transition hover:bg-black/5 active:scale-95">
        <svg class="w-6 h-6">
          <use href="assets/icons/sprite.svg#filter"></use>
        </svg>
      </button>

    </div>
  </div>
  }

  @if (variant === 'coupons') {
  <div class="w-full flex flex-col gap-2">

    <!-- Label -->
    <label class="text-sm text-[#0E225C]">Buscar</label>

    <!-- Fila de controles -->
    <div class="flex items-center gap-3">

      <!-- Input -->
      <input type="text" placeholder="Buscar cupón" class="flex-1 bg-white rounded-xl px-4 py-3 text-[#0E225C]
             focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40" />

      <!-- Botón Buscar -->
      <button class="flex items-center gap-2 bg-[#538CFF] text-white
             px-6 py-3 rounded-full
             transition-all duration-300
             hover:bg-[#3F7BFF] hover:shadow-md
             active:scale-95">
        <img src="assets/icons/search.png" class="w-4 h-4" />
        Buscar
      </button>

      <!-- Botón Crear categoría -->
      <button class="flex items-center gap-2 bg-[#0E225C] text-white
             px-6 py-3 rounded-full
             transition-all duration-300
             hover:bg-[#0B1B4B] hover:shadow-md
             active:scale-95">
        <svg class="w-6 h-6">
          <use href="assets/icons/sprite.svg#add"></use>
        </svg>
        Crear cupón
      </button>

      <!-- Botón Filtro -->
      <button class="w-11 h-11 flex items-center justify-center
             rounded-full border border-[#0E225C] text-[#1A2440]
             transition hover:bg-black/5 active:scale-95">
        <svg class="w-6 h-6">
          <use href="assets/icons/sprite.svg#filter"></use>
        </svg>
      </button>

    </div>
  </div>
  }

  @if (variant === 'messages') {
  <div class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 items-end">

    <!-- Categoría -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Categoría</label>
      <select class="w-full bg-white rounded-xl px-4 py-3 pr-10 text-[#0E225C]
               appearance-none
               bg-[url('/assets/icons/select-arrow.png')]
               bg-no-repeat bg-[right_1rem_center] bg-[length:16px]
               focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40">
        <option>Seleccionar</option>
      </select>
    </div>

    <!-- Empresa -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Nombre de la empresa</label>
      <select class="w-full bg-white rounded-xl px-4 py-3 pr-10 text-[#0E225C]
               appearance-none
               bg-[url('/assets/icons/select-arrow.png')]
               bg-no-repeat bg-[right_1rem_center] bg-[length:16px]
               focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40">
        <option>Seleccionar</option>
      </select>
    </div>

    <!-- Botón filtrar -->
    <button class="w-full flex items-center justify-center gap-2
             bg-[#538CFF] text-white rounded-full
             px-6 py-3
             transition-all duration-300 ease-out
             hover:bg-[#3F7BFF] hover:shadow-lg hover:-translate-y-[1px]
             active:scale-95
             focus:outline-none focus:ring-4 focus:ring-[#538CFF]/30">
      <img src="assets/icons/search.png" class="w-4 h-4" />
      Filtrar
    </button>

    <!-- Ordenar -->
    <div class="flex items-center gap-3 justify-start lg:justify-end">
      <span class="text-sm text-[#0E225C] whitespace-nowrap">
        Ordenar por:
      </span>
      <select class="bg-white rounded-xl px-4 py-2 pr-10 text-[#0E225C]
               appearance-none
               bg-[url('/assets/icons/select-arrow2.png')]
               bg-no-repeat bg-[right_1rem_center] bg-[length:16px]
               focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40">
        <option selected>Fecha</option>
      </select>
    </div>

  </div>
  }

  @if (variant === 'audit') {
  <div class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-end">

    <!-- Fecha inicio -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Fecha inicio</label>
      <div class="relative">
        <input #startDate type="date" placeholder="dd/mm/aaaa" class="calendar-input w-full bg-white rounded-xl px-4 py-3 pr-11 text-[#0E225C]
               placeholder:text-[#A0A7BC]
               focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40"
               (click)="openDatePicker(startDate)" />
        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#538CFF]"
          (click)="openDatePicker(startDate)">
          <svg class="w-6 h-6" aria-hidden="true">
            <use href="assets/icons/sprite.svg#calendar"></use>
          </svg>
        </button>
      </div>
    </div>

    <!-- Fecha fin -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Fecha fin</label>
      <div class="relative">
        <input #endDate type="date" placeholder="dd/mm/aaaa" class="calendar-input w-full bg-white rounded-xl px-4 py-3 pr-11 text-[#0E225C]
               placeholder:text-[#A0A7BC]
               focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40"
               (click)="openDatePicker(endDate)" />
        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#538CFF]"
          (click)="openDatePicker(endDate)">
          <svg class="w-6 h-6" aria-hidden="true">
            <use href="assets/icons/sprite.svg#calendar"></use>
          </svg>
        </button>
      </div>
    </div>

    <!-- Tipo de evento -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Tipo de evento</label>
      <div class="relative" tabindex="0" (blur)="auditTypeOpen = false">
        <button type="button"
          class="w-full bg-white rounded-xl px-4 py-3 pr-11 text-[#0E225C] text-left
                 transition-all duration-200
                 focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40"
          (click)="auditTypeOpen = !auditTypeOpen">
          <span [class.text-[#A0A7BC]]="auditTypeSelected === 'Seleccionar tipo'">
            {{ auditTypeSelected }}
          </span>
        </button>
        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[#538CFF] pointer-events-none">
          <svg class="w-4 h-4" aria-hidden="true">
            <use href="assets/icons/sprite.svg#arrow-down1"></use>
          </svg>
        </span>
        @if (auditTypeOpen) {
          <div class="absolute left-0 right-0 mt-2 bg-white rounded-xl shadow-lg ring-1 ring-black/5 overflow-hidden z-20">
            @for (option of auditTypeOptions; track option) {
              <button type="button"
                class="w-full text-left px-4 py-2 text-[#0E225C] hover:bg-[#F4F7FD]
                       transition-colors duration-150"
                (mousedown)="selectAuditType(option)">
                {{ option }}
              </button>
            }
          </div>
        }
      </div>
    </div>

    <!-- Usuario -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Usuario</label>
      <input type="text" placeholder="Buscar usuario" class="w-full bg-white rounded-[14px] px-4 py-3 text-[#0E225C]
             shadow-sm ring-1 ring-black/5
             transition-all duration-200
             placeholder:text-[#A0A7BC]
             focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40 focus:shadow-md" />
    </div>

    <!-- Empresa -->
    <div>
      <label class="text-sm text-[#0E225C] mb-1 block">Empresa</label>
      <input type="text" placeholder="Buscar empresa" class="w-full bg-white rounded-[14px] px-4 py-3 text-[#0E225C]
             shadow-sm ring-1 ring-black/5
             transition-all duration-200
             placeholder:text-[#A0A7BC]
             focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40 focus:shadow-md" />
    </div>

    <!-- Buscar -->
    <div class="flex items-end">
      <button class="w-full flex items-center justify-center gap-2
             bg-[#538CFF] text-white rounded-full
             px-8 py-3
             transition-all duration-300 ease-out
             hover:bg-[#3F7BFF] hover:shadow-lg hover:-translate-y-[1px]
             active:scale-95
             focus:outline-none focus:ring-4 focus:ring-[#538CFF]/30">
        <img src="assets/icons/search.png" class="w-4 h-4" />
        Buscar
      </button>
    </div>
  </div>
  }

  @if (variant === 'companies') {
  <div class="w-full flex flex-col gap-2">

    <!-- Label -->
    <label class="text-sm text-[#0E225C]">Buscar</label>

    <!-- Fila de controles -->
    <div class="flex items-center gap-3">

      <!-- Input -->
      <input type="text" placeholder="Buscar cupón" class="flex-1 bg-white rounded-xl px-4 py-3 text-[#0E225C]
             focus:outline-none focus:ring-2 focus:ring-[#538CFF]/40" />

      <!-- Botón Buscar -->
      <button class="flex items-center gap-2 bg-[#538CFF] text-white
             px-6 py-3 rounded-full
             transition-all duration-300
             hover:bg-[#3F7BFF] hover:shadow-md
             active:scale-95">
        <img src="assets/icons/search.png" class="w-4 h-4" />
        Buscar
      </button>

      <!-- Botón Filtro -->
      <button class="w-11 h-11 flex items-center justify-center
             rounded-full border border-[#0E225C]
             transition hover:bg-black/5 active:scale-95">
        <img src="assets/icons/filter.svg" class="w-5 h-5" />
      </button>

    </div>
  </div>
  }

</div>
