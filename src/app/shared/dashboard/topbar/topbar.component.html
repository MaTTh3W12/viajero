<header class="w-full h-[72px] flex items-center justify-between px-6 rounded-t-[30px]" [ngClass]="bgClass">

  <!-- IZQUIERDA -->
  <div class="flex items-center gap-4 text-white">
    <!-- ☰ Hamburguesa -->
    <button class="p-2 rounded-md hover:bg-white/10 transition">
      <svg class="w-6 h-6" viewBox="0 0 24 24">
        <path d="M3 4.5H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        <path d="M3 9.5H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        <path d="M3 14.5H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        <path d="M3 19.5H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
    </button>

    <h1 class="text-lg font-semibold">
      {{ location }}
    </h1>
  </div>

  <!-- DERECHA -->
  <div class="flex items-center gap-4 relative">

    <!-- Notificaciones -->
    <button class="relative p-2 rounded-full bg-white">
      <img src="assets/icons/notification.svg" class="w-6 h-6" />
      <span
        class="absolute -top-1 -right-1 w-4 h-4 text-xs bg-red-500 text-white rounded-full flex items-center justify-center">
        9
      </span>
    </button>

    <!-- Usuario -->
    <button class="flex items-center gap-2 text-white" (click)="toggleMenu()">
      <img src="assets/img/Male01.png" class="w-9 h-9 rounded-full border-2 border-white" />
      <div class="text-left hidden sm:block">
        <p class="text-sm font-medium">{{ user?.username }}</p>
        <p class="text-xs opacity-80">AO MEDIA</p>
      </div>
      <img src="assets/icons/arrow-down.svg" class="w-6 h-6 text-white" />
    </button>

    <!-- Dropdown -->
    @if (menuOpen) {
    <div class="absolute right-0 top-14 w-48 bg-white rounded-xl shadow-lg py-2 z-50">
      <button class="w-full px-4 py-2 text-left text-[#538CFF] flex items-center gap-2 hover:bg-gray-100">
        <img src="assets/icons/user.svg" class="w-5 h-5" />
        Mi perfil
      </button>

      <button class="w-full px-4 py-2 text-left text-[#538CFF] flex items-center gap-2 hover:bg-gray-100"
        (click)="logout()">
        <img src="assets/icons/logout.svg" class="w-5 h-5" />
        Cerrar sesión
      </button>
    </div>
    }
  </div>
</header>
